<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkVault</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="logo.svg" class="logo-img" alt="LinkVault logo" />
      <span class="logo-text">LinkVault</span>
    </div>

    <button class="btn-new-link" id="btnNewLink">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Link
    </button>

    <nav class="sidebar-nav">
      <a class="nav-item active" data-sort="new" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Feed
      </a>
      <a class="nav-item" data-sort="top" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        Top Saved
      </a>
      <a class="nav-item" data-filter="tags" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
        Tags
      </a>
    </nav>

    <div class="sidebar-tag-cloud" id="sidebarTagCloud"></div>

    <div class="sidebar-footer">
      <div class="sidebar-stats">
        <div class="stat"><span id="statLinks">0</span><small>Links</small></div>
        <div class="stat"><span id="statTags">0</span><small>Tags</small></div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- Top bar -->
    <div class="topbar">
      <div class="topbar-title">
        <h1>Your Feed</h1>
        <p>Discover and manage your curated links.</p>
      </div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" type="text" placeholder="Search links, tags…" />
      </div>
    </div>

    <!-- Paste bar -->
    <div class="paste-bar">
      <div class="paste-avatar">K</div>
      <input id="urlInput" type="url" placeholder="Paste a URL to curate…" autocomplete="url" />
      <button class="btn-add" id="btnAdd">Add</button>
    </div>
    <div class="paste-loader" id="pasteLoader">
      <div class="spinner"></div>
      <span>Fetching page &amp; generating AI summary…</span>
    </div>
    <div class="paste-error" id="pasteError"></div>

    <!-- Sort tabs -->
    <div class="sort-tabs">
      <button class="sort-tab active" data-sort="new">New</button>
      <button class="sort-tab" data-sort="top">Top</button>
      <button class="sort-tab" data-sort="hot">Hot</button>
    </div>

    <!-- Tag filter -->
    <div class="tag-filter-bar" id="tagFilterBar" style="display:none">
      <span>Filtered by:</span>
      <span class="active-tag-pill" id="activeTagPill"></span>
      <button id="clearTagFilter">&#x2715; Clear</button>
    </div>

    <!-- Cards -->
    <div id="postsList"></div>

    <!-- Empty -->
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="30" stroke="#E5E7EB" stroke-width="3"/><path d="M32 20v14M32 38v2" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round"/></svg>
      <h3>No links yet</h3>
      <p>Paste a URL above to add your first link!</p>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
